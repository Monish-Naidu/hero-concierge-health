<svg width="600" height="600" viewBox="0 0 600 600" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Be your own hero — confident figure with a stethoscope">
  <defs>
    <radialGradient id="halo" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#EAD9C4"/>
      <stop offset="55%" stop-color="#E7DAC6"/>
      <stop offset="100%" stop-color="#E7DAC6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- soft sunrise halo -->
  <circle cx="300" cy="260" r="210" fill="url(#halo)"/>

  <!-- cape (behind), signals the hero -->
  <path d="M250 208 C 170 250, 150 410, 196 488 L 286 430 C 258 330, 262 252, 300 212 Z"
        fill="#7E4A2E" fill-opacity="0.9"/>

  <!-- hero figure (clay) -->
  <g fill="#A86A45" stroke="#A86A45" stroke-linecap="round" stroke-linejoin="round">
    <!-- legs -->
    <path d="M284 338 L268 486" stroke-width="36" fill="none"/>
    <path d="M316 338 L332 486" stroke-width="36" fill="none"/>
    <!-- feet -->
    <path d="M252 486 L292 486" stroke-width="22" fill="none"/>
    <path d="M308 486 L348 486" stroke-width="22" fill="none"/>
    <!-- arms, hands on hips -->
    <path d="M258 214 L201 256 L270 300" stroke-width="30" fill="none"/>
    <path d="M342 214 L399 256 L330 300" stroke-width="30" fill="none"/>
    <!-- torso -->
    <path d="M252 206 Q300 192 348 206 L336 332 Q300 348 264 332 Z"/>
    <!-- neck -->
    <rect x="285" y="150" width="30" height="44" rx="12"/>
    <!-- head -->
    <circle cx="300" cy="138" r="44"/>
  </g>

  <!-- stethoscope (cream, on the chest) -->
  <g stroke="#F4EEE3" stroke-linecap="round" fill="none">
    <circle cx="280" cy="196" r="7" fill="#F4EEE3" stroke="none"/>
    <circle cx="320" cy="196" r="7" fill="#F4EEE3" stroke="none"/>
    <path d="M280 202 C 276 250, 294 276, 300 292" stroke-width="8"/>
    <path d="M320 202 C 324 250, 306 276, 300 292" stroke-width="8"/>
  </g>
  <circle cx="300" cy="304" r="17" fill="#F4EEE3"/>
  <circle cx="300" cy="304" r="8.5" fill="#A86A45"/>
</svg>
