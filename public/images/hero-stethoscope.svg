<svg width="600" height="600" viewBox="0 0 600 600" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Be your own hero — confident figure wearing a stethoscope">
  <defs>
    <radialGradient id="halo" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#EAD9C4"/>
      <stop offset="55%" stop-color="#E7DAC6"/>
      <stop offset="100%" stop-color="#E7DAC6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- soft sunrise halo -->
  <circle cx="300" cy="260" r="210" fill="url(#halo)"/>

  <!-- cape (behind), signals the hero -->
  <path d="M250 210 C 172 252, 152 408, 198 486 L 286 430 C 258 332, 262 254, 300 214 Z"
        fill="#7E4A2E" fill-opacity="0.9"/>

  <!-- hero figure (clay) — simple silhouette -->
  <g fill="#A86A45" stroke="#A86A45" stroke-linecap="round" stroke-linejoin="round">
    <!-- legs -->
    <path d="M286 340 L272 480" stroke-width="34" fill="none"/>
    <path d="M314 340 L328 480" stroke-width="34" fill="none"/>
    <!-- feet -->
    <path d="M258 482 L296 482" stroke-width="20" fill="none"/>
    <path d="M304 482 L342 482" stroke-width="20" fill="none"/>
    <!-- arms, hands on hips -->
    <path d="M260 216 L206 256 L272 300" stroke-width="30" fill="none"/>
    <path d="M340 216 L394 256 L328 300" stroke-width="30" fill="none"/>
    <!-- torso -->
    <path d="M254 208 Q300 194 346 208 L334 336 Q300 352 266 336 Z"/>
    <!-- neck -->
    <rect x="286" y="150" width="28" height="46" rx="12"/>
    <!-- head -->
    <circle cx="300" cy="136" r="44"/>
  </g>

  <!-- stethoscope, worn around the neck and draping down both sides of the chest (cream) -->
  <g stroke="#F4EEE3" fill="none" stroke-linecap="round">
    <!-- binaural band around the neck -->
    <path d="M266 208 C 273 172, 327 172, 334 208" stroke-width="9"/>
    <!-- tubes draping over the shoulders, down the sides, then to the chestpiece -->
    <path d="M266 208 C 246 252, 258 326, 297 352" stroke-width="9"/>
    <path d="M334 208 C 354 252, 342 326, 303 352" stroke-width="9"/>
    <!-- ear-tube tips resting on the shoulders -->
    <circle cx="266" cy="208" r="7" fill="#F4EEE3" stroke="none"/>
    <circle cx="334" cy="208" r="7" fill="#F4EEE3" stroke="none"/>
  </g>
  <!-- chestpiece (diaphragm) hanging low on the chest -->
  <circle cx="300" cy="364" r="18" fill="#F4EEE3"/>
  <circle cx="300" cy="364" r="9" fill="#A86A45"/>
</svg>
