<svg width="200" height="208" viewBox="0 0 200 208" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Hero Concierge Health — a real Chicago clinic">
  <!-- Chicago skyline + stethoscope emblem. Cream strokes read on the dark hero overlay; clay chestpiece accent. -->
  <g stroke="#F4EEE3" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- earpieces (binaural) -->
    <circle cx="66" cy="22" r="6" fill="#F4EEE3" stroke="none"/>
    <circle cx="134" cy="22" r="6" fill="#F4EEE3" stroke="none"/>
    <path d="M66 28 C 68 40, 74 44, 80 48"/>
    <path d="M134 28 C 132 40, 126 44, 120 48"/>
    <!-- stethoscope tube ring (the roundel) -->
    <circle cx="100" cy="104" r="76"/>
  </g>

  <!-- Chicago skyline silhouette inside the ring -->
  <g fill="#F4EEE3">
    <rect x="56" y="98" width="12" height="28" rx="1"/>
    <rect x="70" y="86" width="10" height="40" rx="1"/>
    <!-- Willis Tower with antennas -->
    <rect x="82" y="72" width="16" height="54" rx="1"/>
    <rect x="85" y="60" width="2.4" height="12"/>
    <rect x="93" y="56" width="2.4" height="16"/>
    <rect x="100" y="90" width="11" height="36" rx="1"/>
    <!-- tapered tower (Hancock cue) -->
    <path d="M113 126 L113 82 L125 78 L125 126 Z"/>
    <rect x="128" y="94" width="11" height="32" rx="1"/>
    <!-- ground line -->
    <rect x="50" y="126" width="100" height="3" rx="1.5"/>
  </g>

  <!-- chestpiece (diaphragm) hanging at the bottom of the ring -->
  <circle cx="100" cy="186" r="16" fill="#A86A45"/>
  <circle cx="100" cy="186" r="8.5" fill="none" stroke="#F4EEE3" stroke-width="3"/>
  <path d="M100 180 L100 172" stroke="#A86A45" stroke-width="6" stroke-linecap="round"/>
</svg>
