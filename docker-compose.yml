version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: heromenshealth-app
    ports:
      - "127.0.0.1:3005:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      # GraphQL API configuration (set these in your .env.local or override in docker-compose)
      - NEXT_PUBLIC_GRAPHQL_ENDPOINT=${NEXT_PUBLIC_GRAPHQL_ENDPOINT:-http://192.168.1.19:8082/api/websites/v1}
      - NEXT_PUBLIC_X_API_KEY=${NEXT_PUBLIC_X_API_KEY}
      - NEXT_PUBLIC_ENABLE_APOLLO_CACHE=${NEXT_PUBLIC_ENABLE_APOLLO_CACHE:-true}
    restart: unless-stopped
    # Security settings
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    # Resource limits (Docker Compose v2 синтаксис)
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
    # Health check (port 3000 is internal container port)
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

